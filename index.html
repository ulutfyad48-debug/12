<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروڈکٹ کیٹلاگ - سب فولڈرز کے ساتھ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            padding: 16px;
            direction: rtl;
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 22px;
            margin-bottom: 20px;
            padding: 12px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.14);
        }

        /* ===== IMAGE WRAPPER ===== */
        .img-wrapper {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            cursor: pointer;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.22s;
        }

        .img-wrapper:hover img {
            transform: scale(1.04);
        }

        .zoom-hint {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 11px;
            padding: 3px 7px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .img-wrapper:hover .zoom-hint {
            opacity: 1;
        }

        /* ===== VIDEO WRAPPER ===== */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            background: #0d0d1a;
            cursor: pointer;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.22s;
        }

        .video-wrapper:hover video {
            transform: scale(1.02);
        }

        /* Play button overlay */
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.35);
            transition: background 0.2s;
        }

        .video-wrapper:hover .play-overlay {
            background: rgba(0,0,0,0.15);
        }

        .play-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: transform 0.18s, background 0.15s;
        }

        .video-wrapper:hover .play-icon {
            transform: scale(1.12);
            background: #fff;
        }

        .play-icon svg {
            width: 20px;
            height: 20px;
            fill: #1a1a2e;
            margin-right: -3px; /* optical center */
        }

        /* Video badge */
        .video-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        /* Duration badge */
        .duration-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.72);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 6px;
            display: none;
        }

        /* ===== PRODUCT NAME ===== */
        .product-name {
            padding: 8px 10px 4px;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            text-align: center;
            word-break: break-word;
        }

        /* ===== ACTION BUTTONS ===== */
        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 8px 8px 10px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background 0.15s, transform 0.1s, opacity 0.15s;
            min-height: 38px;
            touch-action: manipulation;
            letter-spacing: 0.01em;
        }

        .btn:active { transform: scale(0.96); opacity: 0.85; }

        .btn-copy-link {
            background: #4361ee;
            color: #fff;
            grid-column: span 2;
        }
        .btn-copy-link:hover { background: #3451d1; }

        .btn-open {
            background: #f0f4ff;
            color: #4361ee;
            border: 1.5px solid #c5d0f8;
        }
        .btn-open:hover { background: #dce4ff; }

        .btn-copy-html {
            background: #fff4e6;
            color: #e07b00;
            border: 1.5px solid #ffd8a0;
        }
        .btn-copy-html:hover { background: #ffe8c0; }

        .btn-copy-md {
            background: #f0fdf4;
            color: #1a8e4a;
            border: 1.5px solid #a3e6bc;
        }
        .btn-copy-md:hover { background: #d2f5e2; }

        /* Video specific button */
        .btn-play-video {
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            grid-column: span 2;
        }
        .btn-play-video:hover { background: linear-gradient(135deg, #c1121f, #a00c17); }

        /* ===== FOLDER TITLE ===== */
        .folder-name {
            grid-column: 1 / -1;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== TOAST ===== */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: #1a1a2e;
            color: #fff;
            padding: 11px 24px;
            border-radius: 28px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 9999;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== IMAGE LIGHTBOX ===== */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }

        #lightbox.open { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #lightbox-img {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        #lightbox-name {
            color: #ddd;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            max-width: 90vw;
            word-break: break-word;
        }

        #lightbox-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lb-btn {
            border: none;
            border-radius: 10px;
            padding: 11px 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
            touch-action: manipulation;
            transition: opacity 0.15s, transform 0.1s;
        }

        .lb-btn:active { transform: scale(0.95); opacity: 0.8; }

        .lb-btn-copy { background: #4361ee; color: #fff; }
        .lb-btn-copy:hover { background: #3451d1; }

        .lb-btn-download { background: #1a8e4a; color: #fff; }
        .lb-btn-download:hover { background: #157a3e; }

        .lb-btn-close {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: 1.5px solid rgba(255,255,255,0.25);
        }
        .lb-btn-close:hover { background: rgba(255,255,255,0.2); }

        /* ===== VIDEO MODAL ===== */
        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }

        #video-modal.open { display: flex; }

        #modal-video {
            max-width: 100%;
            max-height: 70vh;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            background: #000;
            outline: none;
        }

        #video-modal-name {
            color: #ccc;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            max-width: 90vw;
            word-break: break-word;
        }

        #video-modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ===== SVG ICONS ===== */
        .icon { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

        @media (max-width: 400px) {
            #product-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>

    <h1>میرے تمام پروڈکٹس</h1>
    <div id="product-container">لوڈنگ جاری ہے...</div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Image Lightbox -->
    <div id="lightbox" role="dialog" aria-modal="true">
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-name"></div>
        <div id="lightbox-actions">
            <button class="lb-btn lb-btn-copy" onclick="lbCopyLink()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
                لنک کاپی کریں
            </button>
            <button class="lb-btn lb-btn-download" onclick="lbDownload()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                ڈاؤنلوڈ
            </button>
            <button class="lb-btn lb-btn-close" onclick="closeLightbox()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                بند کریں
            </button>
        </div>
    </div>

    <!-- Video Modal -->
    <div id="video-modal" role="dialog" aria-modal="true">
        <video id="modal-video" controls playsinline></video>
        <div id="video-modal-name"></div>
        <div id="video-modal-actions">
            <button class="lb-btn lb-btn-copy" onclick="vmCopyLink()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
                لنک کاپی کریں
            </button>
            <button class="lb-btn lb-btn-download" onclick="vmDownload()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                ڈاؤنلوڈ
            </button>
            <button class="lb-btn lb-btn-close" onclick="closeVideoModal()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                بند کریں
            </button>
        </div>
    </div>

    <script>
        const username = "ulutfyad48-debug";
        const repo = "12";
        const mainFolder = "1122";

        // ========== TOAST ==========
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ========== CLIPBOARD ==========
        async function copyText(text, successMsg) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(successMsg || '✅ کاپی ہو گیا!');
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast(successMsg || '✅ کاپی ہو گیا!');
            }
        }

        // ========== IMAGE LIGHTBOX ==========
        let currentImgUrl = '';
        let currentImgName = '';

        function openLightbox(url, name) {
            currentImgUrl = url;
            currentImgName = name;
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-img').alt = name;
            document.getElementById('lightbox-name').textContent = name;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        function lbCopyLink() { copyText(currentImgUrl, '✅ تصویر کا لنک کاپی ہو گیا!'); }

        function lbDownload() {
            const a = document.createElement('a');
            a.href = currentImgUrl;
            a.download = currentImgName || 'image';
            a.target = '_blank'; a.rel = 'noopener';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // ========== MOBILE-FRIENDLY DOWNLOAD ==========
        async function mobileDownload(url, name) {
            showToast('⏳ ڈاؤنلوڈ شروع ہو رہا ہے...');
            try {
                const resp = await fetch(url);
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = name || 'video';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 8000);
                showToast('✅ ڈاؤنلوڈ مکمل!');
            } catch {
                window.open(url, '_blank', 'noopener');
                showToast('✅ نئے ٹیب میں کھلا — وہاں سے سیو کریں');
            }
        }

        // ========== VIDEO MODAL ==========
        let currentVideoUrl = '';
        let currentVideoName = '';

        function openVideoModal(url, name) {
            currentVideoUrl = url;
            currentVideoName = name;

            // GitHub raw URLs: open directly in browser tab — fast, no buffering wait
            window.open(url, '_blank', 'noopener');
        }

        function closeVideoModal() {
            const vid = document.getElementById('modal-video');
            vid.pause();
            vid.src = '';
            document.getElementById('video-modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        function vmCopyLink() { copyText(currentVideoUrl, '✅ ویڈیو کا لنک کاپی ہو گیا!'); }

        // Mobile-friendly download: fetch blob then save
        async function vmDownload() {
            showToast('⏳ ڈاؤنلوڈ شروع ہو رہا ہے...');
            try {
                const resp = await fetch(currentVideoUrl);
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = currentVideoName || 'video';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                showToast('✅ ڈاؤنلوڈ مکمل!');
            } catch {
                // Fallback: open in new tab
                window.open(currentVideoUrl, '_blank', 'noopener');
                showToast('✅ نئے ٹیب میں کھلا — وہاں سے سیو کریں');
            }
        }

        document.getElementById('video-modal').addEventListener('click', function(e) {
            if (e.target === this) closeVideoModal();
        });

        // ========== ESC KEY ==========
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { closeLightbox(); closeVideoModal(); }
        });

        // ========== IMAGE CARD ==========
        function createImageCard(item) {
            const url = item.download_url;
            const displayName = item.name.split('.').slice(0, -1).join('.');

            const card = document.createElement('div');
            card.className = 'product-card';

            card.innerHTML = `
                <div class="img-wrapper" onclick="openLightbox('${url.replace(/'/g,"\\'")}', '${displayName.replace(/'/g,"\\'")}')">
                    <img src="${url}" alt="${item.name}" loading="lazy">
                    <span class="zoom-hint">🔍 بڑا دیکھیں</span>
                </div>
                <div class="product-name">${displayName}</div>
                <div class="card-actions">
                    <button class="btn btn-copy-link" onclick="copyText('${url.replace(/'/g,"\\'")}', '✅ تصویر کا لنک کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
                        لنک کاپی کریں
                    </button>
                    <button class="btn btn-open" onclick="window.open('${url.replace(/'/g,"\\'")}','_blank')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                        کھولیں
                    </button>
                    <button class="btn btn-copy-html" onclick="copyText('<img src=\\'${url.replace(/'/g,"\\'")}\\'>','✅ HTML ٹیگ کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                        HTML کاپی
                    </button>
                    <button class="btn btn-copy-md" onclick="copyText('${url.replace(/'/g,"\\'")}','✅ MD لنک کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm16 16V5H5v14h14zM11 7h2v2h2v2h-2v2h-2v-2H9V9h2V7z"/></svg>
                        MD لنک
                    </button>
                </div>
            `;

            return card;
        }

        // ========== VIDEO CARD ==========
        function createVideoCard(item) {
            const url = item.download_url;
            const displayName = item.name.split('.').slice(0, -1).join('.');

            const card = document.createElement('div');
            card.className = 'product-card';

            const safeUrl = url.replace(/'/g, "\\'");
            const safeName = displayName.replace(/'/g, "\\'");

            card.innerHTML = `
                <div class="video-wrapper" onclick="openVideoModal('${safeUrl}', '${safeName}')">
                    <video muted preload="metadata" playsinline>
                        <source src="${url}#t=0.5">
                    </video>
                    <div class="play-overlay">
                        <div class="play-icon">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <span class="video-badge">▶ ویڈیو</span>
                    <span class="duration-badge" id="dur-${item.sha}"></span>
                </div>
                <div class="product-name">${displayName}</div>
                <div class="card-actions">
                    <button class="btn btn-play-video" onclick="window.open('${safeUrl}','_blank','noopener')" style="grid-column:span 2">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        ویڈیو چلائیں
                    </button>
                    <button class="btn btn-copy-link" onclick="copyText('${safeUrl}', '✅ ویڈیو کا لنک کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
                        لنک کاپی
                    </button>
                    <button class="btn btn-copy-md" onclick="mobileDownload('${safeUrl}','${safeName}')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        ڈاؤنلوڈ
                    </button>
                </div>
            `;

            // Show duration after metadata loads
            const videoEl = card.querySelector('video');
            videoEl.addEventListener('loadedmetadata', () => {
                const dur = videoEl.duration;
                if (!isNaN(dur)) {
                    const mins = Math.floor(dur / 60);
                    const secs = Math.floor(dur % 60).toString().padStart(2, '0');
                    const badge = card.querySelector(`#dur-${item.sha}`);
                    if (badge) { badge.textContent = `${mins}:${secs}`; badge.style.display = 'block'; }
                }
            });

            return card;
        }

        // ========== GITHUB API ==========
        async function fetchContent(path) {
            const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
            const response = await fetch(url);
            return await response.json();
        }

        async function loadAllProducts(path) {
            const container = document.getElementById('product-container');
            if (path === mainFolder) container.innerHTML = "";

            try {
                const items = await fetchContent(path);

                for (let item of items) {
                    if (item.type === "dir") {
                        const folderTitle = document.createElement('div');
                        folderTitle.className = 'folder-name';
                        folderTitle.innerHTML = `
                            <svg style="width:16px;height:16px;fill:#aaa;flex-shrink:0" viewBox="0 0 24 24"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/></svg>
                            فولڈر: ${item.name}
                        `;
                        container.appendChild(folderTitle);
                        await loadAllProducts(item.path);

                    } else if (item.type === "file" && item.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                        container.appendChild(createImageCard(item));

                    } else if (item.type === "file" && item.name.match(/\.(mp4|webm|ogg|mov|avi|mkv)$/i)) {
                        container.appendChild(createVideoCard(item));
                    }
                }
            } catch (error) {
                console.error("Error:", error);
                const errDiv = document.createElement('div');
                errDiv.style.cssText = 'grid-column:1/-1;color:red;text-align:center;padding:20px';
                errDiv.textContent = 'لوڈ کرنے میں خرابی آئی۔';
                container.appendChild(errDiv);
            }
        }

        loadAllProducts(mainFolder);
    </script>
</body>
</html>
