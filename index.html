<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>پروڈکٹ کیٹلاگ - جدید ترین سب سے اوپر</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            padding: 16px;
            direction: rtl;
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 22px;
            margin-bottom: 20px;
            padding: 12px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.14);
        }

        /* ===== IMAGE WRAPPER ===== */
        .img-wrapper {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            cursor: pointer;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.22s;
        }

        .img-wrapper:hover img {
            transform: scale(1.04);
        }

        .zoom-hint {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 11px;
            padding: 3px 7px;
            border-radius: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .img-wrapper:hover .zoom-hint {
            opacity: 1;
        }

        /* ===== VIDEO WRAPPER ===== */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            background: #0d0d1a;
            cursor: pointer;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.22s;
        }

        .video-wrapper:hover video {
            transform: scale(1.02);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.35);
            transition: background 0.2s;
        }

        .video-wrapper:hover .play-overlay {
            background: rgba(0,0,0,0.15);
        }

        .play-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            transition: transform 0.18s, background 0.15s;
        }

        .video-wrapper:hover .play-icon {
            transform: scale(1.12);
            background: #fff;
        }

        .play-icon svg {
            width: 20px;
            height: 20px;
            fill: #1a1a2e;
            margin-right: -3px;
        }

        .video-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .duration-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.72);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 6px;
            display: none;
        }

        .product-name {
            padding: 8px 10px 4px;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            text-align: center;
            word-break: break-word;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 8px 8px 10px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background 0.15s, transform 0.1s;
            min-height: 38px;
            touch-action: manipulation;
            letter-spacing: 0.01em;
        }

        .btn:active { transform: scale(0.96); opacity: 0.85; }

        .btn-copy-link {
            background: #4361ee;
            color: #fff;
            grid-column: span 2;
        }
        .btn-copy-link:hover { background: #3451d1; }

        .btn-open {
            background: #f0f4ff;
            color: #4361ee;
            border: 1.5px solid #c5d0f8;
        }
        .btn-open:hover { background: #dce4ff; }

        .btn-copy-html {
            background: #fff4e6;
            color: #e07b00;
            border: 1.5px solid #ffd8a0;
        }
        .btn-copy-html:hover { background: #ffe8c0; }

        .btn-copy-md {
            background: #f0fdf4;
            color: #1a8e4a;
            border: 1.5px solid #a3e6bc;
        }
        .btn-copy-md:hover { background: #d2f5e2; }

        .btn-play-video {
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: #fff;
            grid-column: span 2;
        }
        .btn-play-video:hover { background: linear-gradient(135deg, #c1121f, #a00c17); }

        .folder-name {
            grid-column: 1 / -1;
            background: #1a1a2e;
            color: #e0e0e0;
            padding: 10px 16px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: #1a1a2e;
            color: #fff;
            padding: 11px 24px;
            border-radius: 28px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 9999;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }

        #lightbox.open { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #lightbox-img {
            max-width: 100%;
            max-height: 65vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        #lightbox-name {
            color: #ddd;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            max-width: 90vw;
            word-break: break-word;
        }

        #lightbox-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .lb-btn {
            border: none;
            border-radius: 10px;
            padding: 11px 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 44px;
            touch-action: manipulation;
        }

        .lb-btn:active { transform: scale(0.95); opacity: 0.8; }
        .lb-btn-copy { background: #4361ee; color: #fff; }
        .lb-btn-download { background: #1a8e4a; color: #fff; }
        .lb-btn-close { background: rgba(255,255,255,0.12); color: #fff; border: 1.5px solid rgba(255,255,255,0.25); }
        .lb-btn-close:hover { background: rgba(255,255,255,0.2); }

        #video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            animation: fadeIn 0.2s ease;
        }
        #video-modal.open { display: flex; }
        #modal-video {
            max-width: 100%;
            max-height: 70vh;
            width: 100%;
            border-radius: 12px;
            background: #000;
        }
        .icon { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

        @media (max-width: 400px) {
            #product-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
    <h1>📦 میرے تمام پروڈکٹس (نئے سب سے اوپر)</h1>
    <div id="product-container">⏳ لوڈنگ جاری ہے...</div>
    <div id="toast"></div>

    <!-- Lightbox -->
    <div id="lightbox" role="dialog" aria-modal="true">
        <img id="lightbox-img" src="" alt="">
        <div id="lightbox-name"></div>
        <div id="lightbox-actions">
            <button class="lb-btn lb-btn-copy" onclick="lbCopyLink()"><svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg> لنک کاپی</button>
            <button class="lb-btn lb-btn-download" onclick="lbDownload()"><svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> ڈاؤنلوڈ</button>
            <button class="lb-btn lb-btn-close" onclick="closeLightbox()"><svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> بند کریں</button>
        </div>
    </div>

    <!-- Video Modal (opens in new tab, but kept for structure) -->
    <div id="video-modal" role="dialog" aria-modal="true">
        <video id="modal-video" controls playsinline></video>
        <div id="video-modal-name"></div>
        <div id="video-modal-actions">
            <button class="lb-btn lb-btn-copy" onclick="vmCopyLink()"><svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg> لنک کاپی</button>
            <button class="lb-btn lb-btn-download" onclick="vmDownload()"><svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> ڈاؤنلوڈ</button>
            <button class="lb-btn lb-btn-close" onclick="closeVideoModal()"><svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg> بند کریں</button>
        </div>
    </div>

    <script>
        const username = "ulutfyad48-debug";
        const repo = "12";
        const mainFolder = "1122";

        // ---- TOAST ----
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ---- CLIPBOARD ----
        async function copyText(text, successMsg) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(successMsg || '✅ کاپی ہو گیا!');
            } catch {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast(successMsg || '✅ کاپی ہو گیا!');
            }
        }

        // ---- IMAGE LIGHTBOX ----
        let currentImgUrl = '', currentImgName = '';
        function openLightbox(url, name) {
            currentImgUrl = url;
            currentImgName = name;
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-name').textContent = name;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
        function lbCopyLink() { copyText(currentImgUrl, '✅ تصویر کا لنک کاپی ہو گیا!'); }
        function lbDownload() {
            const a = document.createElement('a');
            a.href = currentImgUrl;
            a.download = currentImgName || 'image';
            a.target = '_blank'; a.rel = 'noopener';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }
        document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });

        // ---- VIDEO MODAL (opens new tab for direct play) ----
        let currentVideoUrl = '', currentVideoName = '';
        function openVideoModal(url, name) {
            currentVideoUrl = url;
            currentVideoName = name;
            window.open(url, '_blank', 'noopener');
        }
        function closeVideoModal() {
            const vid = document.getElementById('modal-video');
            if (vid) vid.pause();
            document.getElementById('video-modal').classList.remove('open');
            document.body.style.overflow = '';
        }
        function vmCopyLink() { copyText(currentVideoUrl, '✅ ویڈیو لنک کاپی ہو گیا!'); }
        async function vmDownload() {
            showToast('⏳ ڈاؤنلوڈ شروع...');
            try {
                const resp = await fetch(currentVideoUrl);
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = currentVideoName || 'video';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                showToast('✅ ڈاؤنلوڈ مکمل!');
            } catch {
                window.open(currentVideoUrl, '_blank', 'noopener');
                showToast('نئے ٹیب میں کھل گیا، وہاں سے سیو کریں');
            }
        }
        document.getElementById('video-modal').addEventListener('click', function(e) { if (e.target === this) closeVideoModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeLightbox(); closeVideoModal(); } });

        // ----- HELPER: fetch file commit dates for a given folder (newest first sorting) -----
        // Returns Map<filename (base), ISO date string>
        const commitDateCache = new Map(); // cache per folder path
        async function fetchCommitDatesForFolder(folderPath, fileNames) {
            if (!folderPath) folderPath = "";
            const cacheKey = `${folderPath}`;
            if (commitDateCache.has(cacheKey)) return commitDateCache.get(cacheKey);
            
            const dateMap = new Map();
            try {
                // Get latest 100 commits that affected this folder path
                const apiUrl = `https://api.github.com/repos/${username}/${repo}/commits?path=${encodeURIComponent(folderPath)}&per_page=100`;
                const resp = await fetch(apiUrl);
                if (!resp.ok) throw new Error("Commits fetch failed");
                const commits = await resp.json();
                // iterate commits from latest to older
                for (const commit of commits) {
                    const filesModified = commit.files || [];
                    const commitDate = commit.commit.committer.date;
                    for (const fileInfo of filesModified) {
                        const fullPath = fileInfo.filename;
                        // only consider files that are directly inside this folder or subfolders?
                        // we need exact base filename that matches our items
                        const baseName = fullPath.split('/').pop();
                        if (fileNames.includes(baseName)) {
                            if (!dateMap.has(baseName) || new Date(commitDate) > new Date(dateMap.get(baseName))) {
                                dateMap.set(baseName, commitDate);
                            }
                        }
                    }
                }
                // For files that never appeared in commits (rare), assign fallback date (oldest possible)
                for (const fname of fileNames) {
                    if (!dateMap.has(fname)) {
                        dateMap.set(fname, "1970-01-01T00:00:00Z");
                    }
                }
            } catch (err) {
                console.warn("Failed to fetch commit dates for sorting, using fallback alphabetical", err);
                // Fallback: assign same date to all so sorting falls to name desc (newer naming maybe)
                for (const fname of fileNames) {
                    dateMap.set(fname, "2000-01-01T00:00:00Z");
                }
            }
            commitDateCache.set(cacheKey, dateMap);
            return dateMap;
        }

        // ---- CREATE CARDS ----
        function createImageCard(item, dateForDisplay = null) {
            const url = item.download_url;
            const displayName = item.name.split('.').slice(0, -1).join('.');
            const safeUrl = url.replace(/'/g, "\\'");
            const safeName = displayName.replace(/'/g, "\\'");
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-date', dateForDisplay || '');
            card.innerHTML = `
                <div class="img-wrapper" onclick="openLightbox('${safeUrl}', '${safeName}')">
                    <img src="${url}" alt="${item.name}" loading="lazy">
                    <span class="zoom-hint">🔍 بڑا دیکھیں</span>
                </div>
                <div class="product-name">${displayName}</div>
                <div class="card-actions">
                    <button class="btn btn-copy-link" onclick="copyText('${safeUrl}', '✅ تصویر کا لنک کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
                        لنک کاپی
                    </button>
                    <button class="btn btn-open" onclick="window.open('${safeUrl}','_blank')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
                        کھولیں
                    </button>
                    <button class="btn btn-copy-html" onclick="copyText('<img src=\\'${safeUrl}\\'>','✅ HTML ٹیگ کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                        HTML
                    </button>
                    <button class="btn btn-copy-md" onclick="copyText('${safeUrl}','✅ MD لنک کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm16 16V5H5v14h14zM11 7h2v2h2v2h-2v2h-2v-2H9V9h2V7z"/></svg>
                        MD لنک
                    </button>
                </div>
            `;
            return card;
        }

        function createVideoCard(item, dateForDisplay = null) {
            const url = item.download_url;
            const displayName = item.name.split('.').slice(0, -1).join('.');
            const safeUrl = url.replace(/'/g, "\\'");
            const safeName = displayName.replace(/'/g, "\\'");
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-date', dateForDisplay || '');
            const uniqueId = `vid-${Date.now()}-${Math.random()}`;
            card.innerHTML = `
                <div class="video-wrapper" onclick="openVideoModal('${safeUrl}', '${safeName}')">
                    <video muted preload="metadata" playsinline>
                        <source src="${url}#t=0.5">
                    </video>
                    <div class="play-overlay">
                        <div class="play-icon">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <span class="video-badge">▶ ویڈیو</span>
                    <span class="duration-badge" id="dur-${uniqueId}"></span>
                </div>
                <div class="product-name">${displayName}</div>
                <div class="card-actions">
                    <button class="btn btn-play-video" onclick="window.open('${safeUrl}','_blank','noopener')" style="grid-column:span 2">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        ویڈیو چلائیں
                    </button>
                    <button class="btn btn-copy-link" onclick="copyText('${safeUrl}', '✅ ویڈیو کا لنک کاپی ہو گیا!')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
                        لنک کاپی
                    </button>
                    <button class="btn btn-copy-md" onclick="mobileDownload('${safeUrl}','${safeName}')">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        ڈاؤنلوڈ
                    </button>
                </div>
            `;
            const videoEl = card.querySelector('video');
            videoEl.addEventListener('loadedmetadata', () => {
                const dur = videoEl.duration;
                if (!isNaN(dur)) {
                    const mins = Math.floor(dur / 60);
                    const secs = Math.floor(dur % 60).toString().padStart(2, '0');
                    const badge = card.querySelector(`#dur-${uniqueId}`);
                    if (badge) { badge.textContent = `${mins}:${secs}`; badge.style.display = 'block'; }
                }
            });
            return card;
        }

        async function mobileDownload(url, name) {
            showToast('⏳ ڈاؤنلوڈ شروع...');
            try {
                const resp = await fetch(url);
                const blob = await resp.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = name || 'media';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 6000);
                showToast('✅ ڈاؤنلوڈ مکمل!');
            } catch {
                window.open(url, '_blank', 'noopener');
                showToast('نئے ٹیب میں کھلا، وہاں سے سیو کریں');
            }
        }

        // ----- CORE: Process folder recursively with SORTING (newest first) -----
        async function processFolder(folderPath, containerElement) {
            const contentsUrl = `https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`;
            let items;
            try {
                const res = await fetch(contentsUrl);
                if (!res.ok) throw new Error('Folder not accessible');
                items = await res.json();
            } catch (err) {
                console.error(err);
                const errDiv = document.createElement('div');
                errDiv.style.cssText = 'grid-column:1/-1;color:red;text-align:center;padding:20px';
                errDiv.textContent = `فولڈر لوڈ نہیں ہو سکا: ${folderPath}`;
                containerElement.appendChild(errDiv);
                return;
            }

            // Separate directories and media files
            const subDirs = [];
            const imageFiles = [];
            const videoFiles = [];
            for (const it of items) {
                if (it.type === 'dir') {
                    subDirs.push(it);
                } else if (it.type === 'file') {
                    if (it.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) imageFiles.push(it);
                    else if (it.name.match(/\.(mp4|webm|ogg|mov|avi|mkv)$/i)) videoFiles.push(it);
                }
            }
            
            // Combine all media files for sorting
            const allMedia = [...imageFiles, ...videoFiles];
            if (allMedia.length > 0) {
                const fileNames = allMedia.map(f => f.name);
                const dateMap = await fetchCommitDatesForFolder(folderPath, fileNames);
                // Sort by commit date descending (newest first)
                allMedia.sort((a, b) => {
                    const dateA = dateMap.get(a.name) || "1970-01-01";
                    const dateB = dateMap.get(b.name) || "1970-01-01";
                    return new Date(dateB) - new Date(dateA);
                });
                // Append sorted media cards
                for (const media of allMedia) {
                    const commitDate = dateMap.get(media.name) || "";
                    if (media.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                        containerElement.appendChild(createImageCard(media, commitDate));
                    } else {
                        containerElement.appendChild(createVideoCard(media, commitDate));
                    }
                }
            }

            // Process subfolders recursively (keep subfolder order by name, but you can also sort by date? user didn't specify, we keep alphabetical)
            // Sort subfolders alphabetically for neatness
            subDirs.sort((a, b) => a.name.localeCompare(b.name));
            for (const dir of subDirs) {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-name';
                folderDiv.innerHTML = `<svg style="width:16px;height:16px;fill:#aaa;flex-shrink:0" viewBox="0 0 24 24"><path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/></svg> 📂 ${dir.name}`;
                containerElement.appendChild(folderDiv);
                await processFolder(dir.path, containerElement);
            }
        }

        // ---- INITIAL LOAD ----
        async function loadCatalog() {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            try {
                await processFolder(mainFolder, container);
                if (container.children.length === 0) {
                    container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">🤷 کوئی پروڈکٹ نہیں ملی (نہ تصویر نہ ویڈیو)</div>';
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="grid-column:1/-1;color:red;text-align:center;padding:20px">خرابی آگئی، انٹرنیٹ چیک کریں یا ریپوزٹری درست ہے؟</div>';
            }
        }

        loadCatalog();
    </script>
