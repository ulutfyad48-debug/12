<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروڈکٹ کیٹلاگ - سب فولڈرز کے ساتھ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; direction: rtl; }
        h1 { text-align: center; color: #333; }
        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 5px; }
        .product-card p { margin-top: 10px; font-weight: bold; font-size: 14px; color: #555; }
        .folder-name { grid-column: 1 / -1; background: #333; color: white; padding: 10px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>میرے تمام پروڈکٹس</h1>
    <div id="product-container">لوڈنگ جاری ہے...</div>

    <script>
        const username = "ulutfyad48-debug";
        const repo = "12";
        const mainFolder = "1122";

        async function fetchContent(path) {
            const url = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;
            const response = await fetch(url);
            return await response.json();
        }

        async function loadAllProducts(path) {
            const container = document.getElementById('product-container');
            if(path === mainFolder) container.innerHTML = ""; // پہلی بار صاف کریں

            try {
                const items = await fetchContent(path);

                for (let item of items) {
                    if (item.type === "dir") {
                        // اگر یہ ایک فولڈر ہے، تو اس کے اندر کی چیزیں ڈھونڈو
                        const folderTitle = document.createElement('div');
                        folderTitle.className = 'folder-name';
                        folderTitle.innerText = `فولڈر: ${item.name}`;
                        container.appendChild(folderTitle);
                        
                        await loadAllProducts(item.path); // ریکرسو کال (فولڈر کے اندر جانا)
                    } 
                    else if (item.type === "file" && item.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                        // اگر یہ تصویر ہے، تو کارڈ بناؤ
                        const card = document.createElement('div');
                        card.className = 'product-card';
                        const displayName = item.name.split('.').slice(0, -1).join('.');

                        card.innerHTML = `
                            <img src="${item.download_url}" alt="${item.name}">
                            <p>${displayName}</p>
                        `;
                        container.appendChild(card);
                    }
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        loadAllProducts(mainFolder);
    </script>
</body>
</html>
